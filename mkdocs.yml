site_name: FusionCore
site_url: https://manankharwar.github.io/fusioncore/
site_description: ROS 2 UKF sensor fusion. IMU + wheel encoders + GPS → one position estimate.
site_author: Manan Kharwar
repo_url: https://github.com/manankharwar/fusioncore
repo_name: manankharwar/fusioncore
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - blog:
      blog_dir: blog
      post_url_format: "{slug}"
      archive: false
      categories: false
      authors: false
      post_excerpt: required
  - tags

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Hardware:
    - Overview & Configs: hardware/index.md
    - Indoor / Wheels only (no GPS): hardware/wheels-indoor.md
    - Indoor / LiDAR ICP (no GPS): hardware/icp-indoor.md
    - Visual SLAM + IMU (no GPS): hardware/vslam-imu.md
    - Ackermann / Car-like Robots: hardware/ackermann.md
    - Environment Presets: hardware/environment-presets.md
  - Nav2 Integration: nav2.md
  - Simulation: simulation.md
  - FusionCore vs robot_localization: vs-robot-localization.md
  - Migrating from robot_localization: migration_from_robot_localization.md
  - How It Works: how-it-works.md
  - Troubleshooting: troubleshooting.md
  - Known Limitations: known-limitations.md
  - Blog: blog/index.md
  - Reference:
    - Topics & TF: reference/topics.md
    - Benchmark Results: reference/benchmark.md
    - Architecture: reference/architecture.md
